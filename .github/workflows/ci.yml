name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,dev,server]"

      - name: Run tests
        run: pytest --tb=short -q

      - name: Lint with black
        run: black --check .

      - name: Type check with mypy
        continue-on-error: true
        run: mypy oasyce --ignore-missing-imports

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check symlinks
        run: |
          for f in CLAUDE.md CODEX.md .cursorrules .windsurfrules .github/copilot-instructions.md; do
            if [ ! -L "$f" ]; then echo "FAIL: $f is not a symlink to AGENTS.md" && exit 1; fi
          done
          echo "Symlinks OK"

      - name: Check doc sync
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify SKILL.md is up to date
        run: python scripts/sync_docs.py

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build
