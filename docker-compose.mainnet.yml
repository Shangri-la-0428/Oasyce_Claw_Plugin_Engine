version: "3.8"

services:
  oasyce:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oasyce-mainnet
    user: "1000:1000"
    ports:
      - "8420:8420"   # Dashboard
      - "9527:9527"   # P2P
    volumes:
      - oasyce-mainnet-data:/home/oasyce/.oasyce
    environment:
      - OASYCE_NETWORK_MODE=mainnet
      - OASYCE_NODE_PORT=9527
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 1G
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8420/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: oasyce-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.mainnet.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - oasyce
    restart: unless-stopped

volumes:
  oasyce-mainnet-data:
  prometheus-data:
